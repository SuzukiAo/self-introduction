name: Deploy to GitHub Pages

# 1. どんな時に実行するか（トリガー）
on:
  push:
    branches: [ main ] # mainブランチにコードがプッシュされたら動く

# 2. ロボットに与える権限（セキュリティ設定）
permissions:
  contents: read     # コードを読み取る権限
  pages: write        # GitHub Pagesに書き込む（公開する）権限
  id-token: write     # 安全に連携するためのトークン権限

# 3. 具体的な作業手順（ジョブ）
jobs:
  build:
    runs-on: ubuntu-latest # Linux（Ubuntu）の仮想環境を裏で立ち上げる
    steps:
      # ステップ①：GitHubにあるあなたのコードをこの環境に持ってくる
      - name: Checkout
        uses: actions/checkout@v4

      # ステップ②：Astroの公式ロボットを使って、自動でインストール・ビルド・公開まで行う
      - name: Install, build, and upload with Astro Clips
        uses: withastro/action@v3